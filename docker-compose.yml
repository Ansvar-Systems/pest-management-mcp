version: "3.8"
services:
  uk-pest-management-mcp:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    pids_limit: 50
    cpus: 0.5
    mem_limit: 128m
    read_only: false  # SQLite needs write access to data/
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
